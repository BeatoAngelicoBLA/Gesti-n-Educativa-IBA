<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alba Digital - Gestión Avanzada de Legajos Escolares</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f1f5f9; color: #1e293b; }
        header { background: #0c4a6e; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-control { background: #0369a1; padding: 8px 12px; border-radius: 6px; }
        select, input { padding: 8px 10px; border-radius: 4px; border: 1px solid #cbd5e1; font-family: inherit; }
        header select { border: none; font-weight: bold; color: #0c4a6e; }
        .container { display: flex; gap: 20px; }
        .panel { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex: 15; min-height: 600px; }
        .visor-panel { background: #f8fafc; padding: 20px; border-radius: 8px; border: 2px dashed #cbd5e1; flex: 9; min-height: 600px; max-width: 500px; }
        .hidden { display: none !important; }
        button { background: #0284c7; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 5px; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        .item-link { color: #0284c7; text-decoration: underline; cursor: pointer; font-weight: bold; }
        
        /* Formularios y Grillas */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .form-carga-rapida { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .form-docente { background: #fff7ed; border: 1px solid #ffedd5; }
        
        /* Estilos de Fichas/Legajos */
        .info-bloque { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .grid-detalles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.95em; }
        .grid-detalles input { padding: 4px 8px; width: 90%; font-size: 0.95em; }
        .carpeta-digital { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 15px; border-radius: 6px; margin-top: 15px; }
        .item-documento { background: white; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 4px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background-color: #f8fafc; }
        .badge { background: #0ea5e9; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .badge-materia { background: #f59e0b; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 5px; display: inline-block; margin-bottom: 4px; }
        .btn-materia-filtro { background: #e2e8f0; color: #334155; border: 2px solid #cbd5e1; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-right: 8px; }
        .btn-materia-filtro.activo { background: #10b981; color: white; border-color: #059669; }
        .input-archivo-custom { font-size: 0.85em; max-width: 180px; }
        
        /* Botones de acción de archivos */
        .btn-file-action { padding: 3px 8px; font-size: 0.8em; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 4px; border: none; color: white; }
        .btn-download { background: #10b981; }
        .btn-download:hover { background: #059669; }
